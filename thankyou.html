<head>

<title>Thank You | Jurassic Spark Electric</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #0f0f0f;
  color: #eaeaea;
  text-align: center;
  padding: 60px 20px;
}

.logo {
  max-width: 400px;
  width: 80%;
  margin-bottom: 40px;
  animation: glowPulse 4s ease-in-out infinite;
}

@keyframes glowPulse {
  0% { filter: drop-shadow(0 0 10px rgba(0,170,255,0.4)); }
  50% { filter: drop-shadow(0 0 25px rgba(0,170,255,0.8)); }
  100% { filter: drop-shadow(0 0 10px rgba(0,170,255,0.4)); }
}

h1 {
  font-size: 32px;
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  margin-bottom: 30px;
  color: #cccccc;
}

.button {
  display: inline-block;
  padding: 14px 28px;
  margin: 10px;
  background-color: #00aaff;
  color: #000;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
  transition: 0.3s ease;
}

.button:hover {
  background-color: #008ecc;
}

.secondary {
  background-color: transparent;
  border: 2px solid #00aaff;
  color: #00aaff;
}

.secondary:hover {
  background-color: #00aaff;
  color: #000;
}
</style>
</head>
