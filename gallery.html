<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completed Residential Projects | Jurassic Spark Electric</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #0f0f0f;
  color: #eaeaea;
  text-align: center;
}

header {
  padding: 30px 20px 10px;
}

header h1 {
  font-size: 26px;
}

.back-link {
  display: inline-block;
  margin-bottom: 20px;
  color: #00aaff;
  text-decoration: none;
}

.gallery-wrapper {
  padding: 0 15px 50px;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
}

.gallery-img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.25s ease;
}

.gallery-img:hover {
  transform: scale(1.03);
}

/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.lightbox.open img {
  animation: zoomIn 0.35s ease;
}

@keyframes zoomIn {
  from { transform: scale(0.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.lightbox img {
  max-width: 100%;
  max-height: 85vh;
  border-radius: 10px;
  transition: transform 0.3s ease, opacity 0.3s ease;
  cursor: grab;
  touch-action: none;
}

.lightbox img.dragging {
  cursor: grabbing;
  transition: none;
}

/* Arrows */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 42px;
  background: rgba(0,0,0,0.35);
  color: #00aaff;
  border: 2px solid rgba(0,170,255,0.6);
  padding: 12px 18px;
  cursor: pointer;
  border-radius: 12px;
  backdrop-filter: blur(6px);
  transition: all 0.25s ease;
  box-shadow: 0 0 10px rgba(0,170,255,0.4);
}

.nav:hover {
  background: rgba(0,170,255,0.15);
  color: #fff;
  box-shadow: 0 0 18px rgba(0,170,255,0.9);
  transform: translateY(-50%) scale(1.1);
}

.prev { left: 20px; }
.next { right: 20px; }

/* Counter */
.counter {
  position: absolute;
  bottom: 20px;
  font-size: 14px;
  color: #ccc;
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="back-link">← Return to Home</a>
  <h1>Completed Residential Electrical Projects</h1>
</header>

<div class="gallery-wrapper">
  <div class="gallery-grid" id="gallery"></div>
</div>

<div id="lightbox" class="lightbox">
  <button class="nav prev">&#10094;</button>
  <img id="lightbox-img">
  <button class="nav next">&#10095;</button>
  <div class="counter" id="counter"></div>
</div>

<script>
const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

const totalImages = 39;
let currentIndex = 0;
const images = [];

/* Build gallery */
for (let i = 1; i <= totalImages; i++) {
  const src = `assets/jurassic-spark-${i}.webp`;
  images.push(src);

  const img = document.createElement('img');
  img.src = src;
  img.classList.add('gallery-img');
  img.loading = "lazy";

  img.addEventListener('click', () => {
    currentIndex = i - 1;
    openLightbox();
  });

  gallery.appendChild(img);
}

/* Core */
function openLightbox() {
  lightbox.style.display = 'flex';
  lightbox.classList.add('open');
  updateImage(true);
}

function updateImage(initial=false) {
  lightboxImg.src = images[currentIndex];
  document.getElementById('counter').textContent =
    `${currentIndex+1} / ${images.length}`;

  resetPan();
  preloadNearby();
}

function showNext() {
  currentIndex = (currentIndex + 1) % images.length;
  updateImage();
}

function showPrev() {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  updateImage();
}

/* Preload */
function preloadNearby() {
  [currentIndex+1, currentIndex-1].forEach(i=>{
    const index = (i + images.length) % images.length;
    const img = new Image();
    img.src = images[index];
  });
}

/* Buttons */
document.querySelector('.next').onclick = e => { e.stopPropagation(); showNext(); };
document.querySelector('.prev').onclick = e => { e.stopPropagation(); showPrev(); };

/* Close */
lightbox.addEventListener('click', e=>{
  if(e.target === lightbox){
    lightbox.style.display='none';
    lightbox.classList.remove('open');
  }
});

/* Keyboard */
document.addEventListener('keydown', e=>{
  if(lightbox.style.display==='flex'){
    if(e.key==='ArrowRight') showNext();
    if(e.key==='ArrowLeft') showPrev();
    if(e.key==='Escape') lightbox.style.display='none';
  }
});

/* Swipe */
let startX=0;
lightbox.addEventListener('touchstart', e=> startX=e.touches[0].clientX);
lightbox.addEventListener('touchend', e=>{
  let diff=e.changedTouches[0].clientX-startX;
  if(Math.abs(diff)>50) diff<0?showNext():showPrev();
});

/* Tap zones */
lightboxImg.addEventListener('click', e=>{
  if(Math.abs(currentX)>5 || Math.abs(currentY)>5) return;

  const rect=lightboxImg.getBoundingClientRect();
  const x=e.clientX-rect.left;

  if(x<rect.width*0.33) showPrev();
  else if(x>rect.width*0.66) showNext();
  else {
    lightbox.style.display='none';
    lightbox.classList.remove('open');
  }
});

/* PAN + SNAP BACK */
let isDragging=false,startX2=0,startY2=0,currentX=0,currentY=0;

function setTranslate(x,y){
  lightboxImg.style.transform=`translate(${x}px,${y}px)`;
}

function resetPan(){
  currentX=0; currentY=0;
  setTranslate(0,0);
}

lightboxImg.addEventListener('mousedown', e=>{
  isDragging=true;
  startX2=e.clientX-currentX;
  startY2=e.clientY-currentY;
  lightboxImg.classList.add('dragging');
});

window.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  currentX=e.clientX-startX2;
  currentY=e.clientY-startY2;
  setTranslate(currentX,currentY);
});

window.addEventListener('mouseup', ()=>{
  if(!isDragging) return;
  isDragging=false;
  lightboxImg.classList.remove('dragging');

  // SNAP BACK
  const snap = ()=>{
    currentX*=0.85;
    currentY*=0.85;
    setTranslate(currentX,currentY);
    if(Math.abs(currentX)>0.5 || Math.abs(currentY)>0.5){
      requestAnimationFrame(snap);
    } else {
      resetPan();
    }
  };
  snap();
});

/* Touch pan */
lightboxImg.addEventListener('touchstart', e=>{
  isDragging=true;
  startX2=e.touches[0].clientX-currentX;
  startY2=e.touches[0].clientY-currentY;
});

lightboxImg.addEventListener('touchmove', e=>{
  if(!isDragging) return;
  currentX=e.touches[0].clientX-startX2;
  currentY=e.touches[0].clientY-startY2;
  setTranslate(currentX,currentY);
});

lightboxImg.addEventListener('touchend', ()=>{
  isDragging=false;

  const snap = ()=>{
    currentX*=0.85;
    currentY*=0.85;
    setTranslate(currentX,currentY);
    if(Math.abs(currentX)>0.5 || Math.abs(currentY)>0.5){
      requestAnimationFrame(snap);
    } else {
      resetPan();
    }
  };
  snap();
});
</script>

</body>
</html>
